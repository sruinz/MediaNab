<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MediaNab</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent-hover: #6ba3ff;
      --success: #2ec27e;
      --warning: #f5a623;
      --error: #e05252;
      --text: #e8eaf0;
      --text-muted: #8890a8;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 420px;
      max-height: 580px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo { width:26px;height:26px;border-radius:6px;overflow:hidden;flex-shrink:0; }
    .logo img { width:100%;height:100%;object-fit:cover; }
    .title {
      font-size:15px;font-weight:700;letter-spacing:-.3px;
      background:linear-gradient(90deg,var(--accent),#a78bfa);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .lang-toggle {
      margin-left:auto;background:var(--surface2);border:1px solid var(--border);
      border-radius:4px;color:var(--text-muted);font-size:11px;padding:2px 7px;cursor:pointer;
    }
    .lang-toggle:hover { color:var(--text); }

    .tabs { display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0; }
    .tab-btn {
      flex:1;padding:8px;background:none;border:none;
      border-bottom:2px solid transparent;
      color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;
    }
    .tab-btn.active { color:var(--accent);border-bottom-color:var(--accent); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    .content { flex:1;overflow-y:auto;padding:10px; }
    .content::-webkit-scrollbar { width:4px; }
    .content::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }

    .empty { display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 20px;color:var(--text-muted);gap:8px;text-align:center; }
    .empty-icon { font-size:30px;opacity:.4; }

    /* 영상 카드 */
    .video-card {
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:10px;margin-bottom:8px;transition:border-color .15s;
    }
    .video-card:hover { border-color:var(--accent); }
    .card-top { display:flex;gap:10px;margin-bottom:8px; }
    .thumb-wrap {
      position:relative;width:100px;height:60px;flex-shrink:0;
      background:#111;border-radius:5px;overflow:hidden;cursor:pointer;
    }
    .thumb-wrap img,
    .thumb-wrap video { width:100%;height:100%;object-fit:cover;background:#111; }
    .thumb-wrap.fit-top-cover img.thumb-image {
      object-fit:cover;
      object-position:center top;
    }
    .thumb-wrap.fit-contain img.thumb-image,
    .thumb-wrap[data-vertical-video="1"] img.thumb-image,
    .thumb-wrap[data-vertical-video="1"] video.thumb-media,
    .thumb-wrap.is-shorts img.thumb-image {
      object-fit:contain;
      object-position:center center;
      background:#05070d;
    }
    .thumb-wrap[data-type="hls"] video {
      object-fit:contain;
      background:#05070d;
    }
    .thumb-wrap.is-shorts img,
    .thumb-wrap.is-shorts video {
      object-fit:contain;
      background:#05070d;
    }
    .thumb-placeholder {
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      color:var(--text-muted);font-size:22px;
    }
    .thumb-placeholder-loading {
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(79,142,247,.14), transparent 38%),
        linear-gradient(135deg, #10131c 0%, #171c28 45%, #131723 100%);
      color:var(--text-muted);
    }
    .thumb-placeholder-loading::before {
      content:"";
      position:absolute;
      inset:-20%;
      background:linear-gradient(110deg, transparent 25%, rgba(255,255,255,.08) 42%, transparent 58%);
      animation:thumbShimmer 2s linear infinite;
      transform:translateX(-120%);
    }
    .thumb-loader {
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:7px;
      width:100%;
      height:100%;
    }
    .thumb-loader-bars {
      display:flex;
      align-items:flex-end;
      gap:4px;
      height:18px;
    }
    .thumb-loader-bars span {
      width:5px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(107,163,255,.95), rgba(79,142,247,.42));
      animation:thumbBars 1s ease-in-out infinite;
      box-shadow:0 0 10px rgba(79,142,247,.18);
    }
    .thumb-loader-bars span:nth-child(1) { height:8px; animation-delay:0s; }
    .thumb-loader-bars span:nth-child(2) { height:15px; animation-delay:.16s; }
    .thumb-loader-bars span:nth-child(3) { height:10px; animation-delay:.32s; }
    .thumb-loader-label {
      font-size:9px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(232,234,240,.74);
    }
    .duration-badge {
      position:absolute;bottom:3px;right:4px;
      background:rgba(0,0,0,.75);color:#fff;font-size:10px;font-weight:600;
      padding:1px 4px;border-radius:3px;pointer-events:none;
    }
    @keyframes thumbShimmer {
      0% { transform:translateX(-120%); }
      100% { transform:translateX(120%); }
    }
    @keyframes thumbBars {
      0%, 100% { transform:scaleY(.72); opacity:.5; }
      50% { transform:scaleY(1.12); opacity:1; }
    }
    .card-info { flex:1;min-width:0; }
    .card-url {
      font-size:11px;color:var(--text-muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;
    }
    .type-badge {
      display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;
      border-radius:3px;margin-bottom:5px;
      background:rgba(79,142,247,.2);color:var(--accent);
    }
    .type-badge.mp4 { background:rgba(46,194,126,.2);color:var(--success); }
    .type-badge.live { background:rgba(224,82,82,.2);color:var(--error);animation:livePulse 1.5s infinite; }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .btn-dl:disabled { opacity:.4;cursor:not-allowed;pointer-events:none; }

    /* 화질 선택 */
    .quality-row { display:flex;gap:6px;align-items:center;margin-bottom:4px; }
    .quality-label { font-size:10px;color:var(--text-muted);flex-shrink:0; }
    select.quality-select {
      flex:1;background:var(--surface2);border:1px solid var(--border);
      border-radius:4px;color:var(--text);font-size:11px;padding:3px 5px;cursor:pointer;
    }
    select.quality-select:focus { outline:none;border-color:var(--accent); }

    /* 버튼 */
    .card-actions { display:flex;gap:6px;margin-top:8px; }
    .btn {
      padding:6px 10px;border-radius:5px;font-size:11px;font-weight:600;
      cursor:pointer;border:none;transition:all .15s;
    }
    .btn-dl { background:var(--accent);color:#fff;flex:1; }
    .btn-dl:hover { background:var(--accent-hover); }
    .btn-live-start {
      background:rgba(224,82,82,.16);color:var(--error);
      border:1px solid rgba(224,82,82,.42);flex:0 0 auto;
    }
    .btn-live-start:hover { background:rgba(224,82,82,.24); }
    .btn-live-stop {
      background:rgba(245,158,11,.14);color:var(--warning);
      border:1px solid rgba(245,158,11,.38);flex:0 0 auto;
    }
    .btn-live-unavailable {
      background:var(--surface2);color:var(--text-muted);
      border:1px solid var(--border);opacity:.65;cursor:not-allowed;
    }
    .btn-rm { background:var(--surface2);color:var(--text-muted);border:1px solid var(--border); }
    .btn-rm:hover { color:var(--text); }

    /* 섹션 헤더 */
    .section-header {
      display:flex;justify-content:space-between;align-items:center;
      padding:2px 2px 8px;color:var(--text-muted);font-size:10px;font-weight:700;
      text-transform:uppercase;letter-spacing:.5px;
    }
    .section-actions { display:flex;align-items:center;gap:8px; }
    .section-header .clear-btn {
      background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 4px;
    }
    .section-header .clear-btn:hover { color:var(--text); }

    .sort-controls { display:flex;gap:4px;padding:0 0 8px; }
    .sort-btn {
      padding:3px 8px;border-radius:4px;font-size:10px;
      background:var(--surface2);border:1px solid var(--border);
      color:var(--text-muted);cursor:pointer;
    }
    .sort-btn.active { background:var(--accent);border-color:var(--accent);color:#fff; }

    /* 큐 */
    .queue-item { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px; }
    .queue-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:6px; }
    .queue-name { font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1; }
    .status-badge { font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:8px;flex-shrink:0; }
    .status-waiting { background:rgba(245,166,35,.15);color:var(--warning); }
    .status-waiting_metadata { background:rgba(245,166,35,.15);color:var(--warning); }
    .status-downloading { background:rgba(79,142,247,.15);color:var(--accent); }
    .status-recording { background:rgba(224,82,82,.15);color:var(--error); }
    .status-stopping { background:rgba(245,166,35,.15);color:var(--warning); }
    .status-error { background:rgba(224,82,82,.15);color:var(--error); }
    .status-done { background:rgba(46,194,126,.15);color:var(--success); }
    .progress-bar { height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px; }
    .progress-fill { height:100%;background:linear-gradient(90deg,var(--accent),#7c3aed);border-radius:2px;transition:width .3s; }
    .progress-bar.indeterminate .progress-fill { width:35%; animation:indeterminateSlide 1.2s linear infinite; }
    @keyframes indeterminateSlide {
      0% { transform:translateX(-120%); }
      100% { transform:translateX(320%); }
    }
    .queue-actions { display:flex;justify-content:flex-end; }

    /* 토스트 메시지 */
    .toast-msg {
      position:fixed;bottom:-50px;left:50%;transform:translateX(-50%);
      background:var(--surface2);color:var(--text);border:1px solid var(--border);
      border-radius:8px;padding:8px 16px;font-size:12px;font-weight:500;
      z-index:9999;transition:bottom .3s ease;max-width:340px;text-align:center;
      box-shadow:0 4px 12px rgba(0,0,0,.4);
    }
    .toast-msg.show { bottom:12px; }
    .toast-warning { border-color:var(--warning);color:var(--warning); }
    .toast-info { border-color:var(--accent);color:var(--accent); }

    /* Companion 상태 바 */
    .companion-status-panel {
      flex-shrink:0;
      background:var(--surface);
      border-top:1px solid var(--border);
    }
    .companion-bar {
      display:flex;align-items:center;gap:6px;
      padding:6px 14px;border-bottom:1px solid var(--border);
      background:var(--surface);font-size:11px;flex-shrink:0;
    }
    .companion-dot {
      width:7px;height:7px;border-radius:50%;flex-shrink:0;
    }
    .companion-dot.connected { background:var(--success); }
    .companion-dot.disconnected { background:var(--text-muted); }
    .companion-bar .info {
      flex:1;min-width:0;color:var(--text-muted);
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .companion-bar .info.connected { color:var(--success); }
    .companion-actions { display:flex;align-items:center;gap:8px;flex-shrink:0; }
    .companion-bar .setup-link {
      width:18px;height:18px;display:flex;align-items:center;justify-content:center;
      color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);
      border-radius:4px;cursor:pointer;padding:0;transition:color .15s,border-color .15s;
    }
    .companion-bar .setup-link:hover { color:var(--accent);border-color:var(--accent); }
    .companion-toggle {
      width:18px;height:18px;display:flex;align-items:center;justify-content:center;
      color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);
      border-radius:4px;cursor:pointer;padding:0;transition:color .15s,border-color .15s,transform .15s;
    }
    .companion-toggle:hover { color:var(--accent);border-color:var(--accent); }
    .companion-toggle svg { transition:transform .15s; }
    .companion-status-panel.expanded .companion-toggle svg { transform:rotate(180deg); }
    .companion-details[hidden] { display:none; }

    /* Companion 경로 행 */
    .companion-path-row {
      display:flex;align-items:center;gap:4px;
      padding:3px 14px 5px;border-bottom:1px solid var(--border);
      background:var(--surface);font-size:10px;
    }
    .path-icon { font-size:11px;flex-shrink:0; }
    .path-icon-svg { flex-shrink:0;color:var(--text-muted); }
    .path-text {
      flex:1;color:var(--text-muted);overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap;font-family:monospace;font-size:10px;
    }
    .path-btn {
      background:none;border:none;color:var(--text-muted);cursor:pointer;
      font-size:12px;padding:1px 4px;border-radius:3px;transition:color .15s;
    }
    .path-btn:hover { color:var(--accent); }

    .companion-cookie-auth-row {
      display:flex;align-items:center;gap:6px;
      padding:3px 14px 6px;border-bottom:1px solid var(--border);
      background:var(--surface);font-size:10px;
    }
    .auth-label { color:var(--text-muted);flex-shrink:0;font-weight:600; }
    .auth-select {
      flex:0 0 94px;min-width:0;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:4px;color:var(--text);font-size:10px;padding:2px 4px;
    }
    .auth-file-text {
      flex:1;min-width:0;color:var(--text-muted);
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;
    }
    .auth-file-btn {
      background:none;border:1px solid var(--border);border-radius:4px;
      color:var(--text-muted);cursor:pointer;font-size:10px;padding:2px 6px;
    }
    .auth-file-btn:hover { color:var(--accent);border-color:var(--accent); }

    /* 개발 로그 패널 */
    .debug-panel {
      flex-shrink:0;
      border-top:1px solid var(--border);
      background:var(--surface);
    }
    .debug-header {
      display:flex;align-items:center;gap:6px;
      padding:7px 10px;color:var(--text-muted);font-size:10px;font-weight:700;
      text-transform:uppercase;letter-spacing:.4px;
    }
    .debug-header-title { color:var(--text); }
    .debug-count {
      min-width:18px;text-align:center;
      padding:1px 5px;border-radius:999px;background:var(--surface2);color:var(--accent);
      font-size:10px;
    }
    .debug-actions { margin-left:auto;display:flex;align-items:center;gap:5px; }
    .debug-btn {
      background:none;border:1px solid var(--border);border-radius:4px;
      color:var(--text-muted);font-size:10px;padding:2px 5px;cursor:pointer;
    }
    .debug-btn:hover { color:var(--text);border-color:var(--accent); }
    .debug-list {
      display:none;
      max-height:150px;
      overflow:auto;
      padding:0 10px 9px;
    }
    .debug-panel.expanded .debug-list { display:block; }
    .debug-list::-webkit-scrollbar,
    .debug-overlay-list::-webkit-scrollbar { width:4px; }
    .debug-list::-webkit-scrollbar-thumb,
    .debug-overlay-list::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }
    .debug-row {
      border:1px solid var(--border);
      border-left:3px solid var(--text-muted);
      border-radius:6px;
      background:#11141d;
      padding:6px;
      margin-bottom:6px;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .debug-error { border-left-color:var(--error); }
    .debug-warn { border-left-color:var(--warning); }
    .debug-info { border-left-color:var(--accent); }
    .debug-meta {
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;
      color:var(--text-muted);font-size:9px;margin-bottom:4px;
    }
    .debug-level { color:var(--text); }
    .debug-scope { color:var(--accent); }
    .debug-tab { color:var(--warning); }
    .debug-message { color:var(--text);font-size:10px;line-height:1.35;word-break:break-word; }
    .debug-data {
      margin-top:5px;white-space:pre-wrap;word-break:break-word;
      color:var(--text-muted);font-size:9px;line-height:1.35;
    }
    .debug-empty {
      padding:12px;text-align:center;color:var(--text-muted);font-size:11px;
      border:1px dashed var(--border);border-radius:6px;
    }
    .debug-overlay {
      display:none;
      position:fixed;inset:0;
      z-index:9998;
      background:var(--bg);
      flex-direction:column;
    }
    .debug-overlay.show { display:flex; }
    .debug-overlay-header {
      display:flex;align-items:center;gap:8px;
      padding:10px;border-bottom:1px solid var(--border);background:var(--surface);
    }
    .debug-overlay-title { font-size:13px;font-weight:700; }
    .debug-overlay-list {
      flex:1;overflow:auto;padding:10px;
    }
    .debug-close {
      margin-left:auto;
      background:var(--surface2);border:1px solid var(--border);border-radius:6px;
      color:var(--text);font-size:16px;line-height:1;padding:2px 8px;cursor:pointer;
    }
    .debug-close:hover { border-color:var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><img src="icons/icon-48.png" alt="MediaNab"></div>
    <div class="title">MediaNab</div>
    <button class="lang-toggle" id="langToggle">EN</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tabDetected">Detected</button>
    <button class="tab-btn" id="tabQueue">Queue</button>
  </div>
  <div class="content" id="contentDetected">
    <div class="section-header">
      <span id="lblDetected">Detected Videos</span>
      <div class="section-actions">
        <button class="clear-btn" id="refreshDetected">Refresh</button>
        <button class="clear-btn" id="clearDetected">Clear list</button>
      </div>
    </div>
    <div class="sort-controls">
      <button class="sort-btn active" data-sort="time">Time</button>
      <button class="sort-btn" data-sort="type">Type</button>
    </div>
    <div id="videoList">
      <div class="empty"><div class="empty-icon">🔍</div><div id="emptyMsg">No videos detected</div></div>
    </div>
  </div>
  <div class="content" id="contentQueue" style="display:none;">
    <div class="section-header">
      <span id="lblQueue">Download Queue</span>
      <button class="clear-btn" id="clearDoneBtn">Clear done</button>
    </div>
    <div class="sort-controls">
      <button class="sort-btn active" data-sort-q="time">Time</button>
      <button class="sort-btn" data-sort-q="status">Status</button>
    </div>
    <div id="queueList">
      <div class="empty"><div class="empty-icon">📋</div><div>No downloads</div></div>
    </div>
  </div>
  <div class="companion-status-panel" id="companionStatusPanel">
    <div class="companion-bar" id="companionBar">
      <span class="companion-dot disconnected" id="companionDot"></span>
      <span class="info" id="companionInfo">Checking connection</span>
      <div class="companion-actions">
        <button class="setup-link" id="companionSetup" title="Setup Guide" aria-label="Setup Guide">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        </button>
        <button class="companion-toggle" id="companionDetailsToggle" aria-expanded="false" title="Show details">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </div>
    <div class="companion-details" id="companionDetails" hidden>
      <div class="companion-path-row" id="companionPathRow">
        <svg class="path-icon-svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span class="path-text" id="companionPath" title="">Browser default download folder</span>
        <button class="path-btn" id="companionChangePath" title="Change folder"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="path-btn" id="companionOpenPath" title="Open folder"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
      </div>
      <div class="companion-cookie-auth-row" id="cookieAuthRow" style="display:none;">
        <span class="auth-label" id="cookieAuthLabel">Cookie auth</span>
        <select class="auth-select" id="cookieAuthSelect">
          <option value="off">Off</option>
          <option value="chrome">Chrome</option>
          <option value="edge">Edge</option>
          <option value="file">cookies.txt</option>
        </select>
        <span class="auth-file-text" id="cookieAuthFile" title=""></span>
        <button class="auth-file-btn" id="cookieAuthPickFile">Pick</button>
      </div>
    </div>
  </div>
  <div class="debug-panel" id="debugPanel">
    <div class="debug-header">
      <span class="debug-header-title" id="debugTitle">Logs</span>
      <span class="debug-count" id="debugLogCount">0</span>
      <div class="debug-actions">
        <button class="debug-btn" id="debugToggle">Open</button>
        <button class="debug-btn" id="debugFullscreen">Full</button>
        <button class="debug-btn" id="debugCopy">Copy</button>
        <button class="debug-btn" id="debugClear">Clear logs</button>
      </div>
    </div>
    <div class="debug-list" id="debugLogList"></div>
  </div>
  <div class="debug-overlay" id="debugLogOverlay">
    <div class="debug-overlay-header">
      <span class="debug-overlay-title" id="debugOverlayTitle">Logs</span>
      <button class="debug-btn" id="debugOverlayCopy">Copy</button>
      <button class="debug-btn" id="debugOverlayClear">Clear logs</button>
      <button class="debug-close" id="debugCloseOverlay" aria-label="Close">×</button>
    </div>
    <div class="debug-overlay-list" id="debugLogOverlayList"></div>
  </div>
  <script src="variant.js"></script>
  <script src="popup.js"></script>
</body>
</html>
